appId: app.twoshares.annotated
productName: Annotated
copyright: Copyright © 2026 twoshares.app

publish:
    provider: generic
    url: https://releases.annotated.app

protocols:
    name: Annotated Protocol
    schemes:
        - annotated

files:
    - src/**/*
    - package.json
    - pickleglass_web/backend_node/**/*
    - '!**/node_modules/electron/**'
    - public/build/**/*

extraResources:
    - from: pickleglass_web/out
      to: out
    - from: .env
      to: .env
    - from: src/seed-voiceprints.json
      to: seed-voiceprints.json

asarUnpack:
    - "src/ui/assets/SystemAudioDump"
    - "**/node_modules/sharp/**/*"
    - "**/node_modules/@img/**/*"
    - "**/node_modules/@google/generative-ai/**/*"
    - "**/node_modules/better-sqlite3/**/*"

win:
    icon: src/ui/assets/logo.ico
    target:
        - target: nsis
          arch: x64
        - target: portable
          arch: x64
    requestedExecutionLevel: asInvoker
    legalTrademarks: twoshares.app
    verifyUpdateCodeSignature: false

nsis:
    oneClick: true
    perMachine: false
    deleteAppDataOnUninstall: false
    createDesktopShortcut: always
    createStartMenuShortcut: true
    shortcutName: Annotated
    installerIcon: src/ui/assets/logo.ico
    uninstallerIcon: src/ui/assets/logo.ico

mac:
    category: public.app-category.utilities
    icon: src/ui/assets/logo.icns
    minimumSystemVersion: '11.0'
    hardenedRuntime: false
    target:
        - target: dmg
          arch: universal
        - target: zip
          arch: universal
